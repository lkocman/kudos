<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Give Kudos</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="kudos.css">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>

<div class="kudos-container">
  <div class="quiz-header">
    <h1>🎉 Give Kudos!</h1>
    <span class="quiz-subtitle">Recognize someone for their achievement</span>
  </div>

  <form class="kudos-form" id="giveKudosForm">
    <div class="form-group">
      <label for="recipient">Recipient Username</label>
      <input type="text" id="recipient" name="to" placeholder="Enter recipient username" required>
    </div>

    <div class="form-group">
      <label for="type">Achievement Type</label>
      <input type="text" id="type" name="type" placeholder="e.g., First Kudos, Social Butterfly">
    </div>

    <div class="form-group">
      <label for="message">Message</label>
      <textarea id="message" name="message" placeholder="Add a short message..." rows="4"></textarea>
    </div>

    <div class="form-group">
      <label for="cc">CC (optional)</label>
      <input type="text" id="cc" name="cc" placeholder="Other usernames, comma-separated">
    </div>

    <button type="submit">Send Kudos 🎁</button>
  </form>
</div>

<script>
  const form = document.getElementById('giveKudosForm');

  form.addEventListener('submit', async (e) => {
    e.preventDefault();

    const data = {
      to: form.to.value.trim(),
      type: form.type.value.trim() || 'first-kudos',
      message: form.message.value.trim(),
      cc: form.cc.value.trim() ? form.cc.value.split(',').map(s=>s.trim()) : []
    };

    const user = prompt("Enter your username (placeholder auth):");
    if (!user) return alert("You must enter a username!");

    try {
      const res = await fetch('/api/kudos', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'X-User': user
        },
        body: JSON.stringify(data)
      });
      const result = await res.json();
      if (res.ok) {
        alert(`Kudos sent to ${result.to}!`);
        form.reset();
      } else {
        alert(`Error: ${result.error}`);
      }
    } catch (err) {
      console.error(err);
      alert("Failed to send kudos.");
    }
  });
</script>

</body>
</html>
